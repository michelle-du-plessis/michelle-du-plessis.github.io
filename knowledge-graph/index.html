// ── Canvas text sprite ────────────────────────────────────────────
// textScale: multiplier for font + sprite size

function makeLabel(text, color, textScale, yOffset) {
  textScale = textScale || 1;
  yOffset   = yOffset   || 10;

  const canvas = document.createElement('canvas');
  const ctx    = canvas.getContext('2d');
  const fSize  = Math.round(26 * textScale);   // base 26px, scaled up for questions
  const font   = `500 ${fSize}px Arial, sans-serif`;
  ctx.font = font;
  const tw   = ctx.measureText(text).width;
  const padX = 12, padY = 8;
  canvas.width  = tw + padX * 2;
  canvas.height = fSize + padY * 2;

  // Rounded background
  ctx.fillStyle = 'rgba(0,0,14,0.58)';
  const r = 6, w = canvas.width, h = canvas.height;
  ctx.beginPath();
  ctx.moveTo(r,0); ctx.lineTo(w-r,0); ctx.quadraticCurveTo(w,0,w,r);
  ctx.lineTo(w,h-r); ctx.quadraticCurveTo(w,h,w-r,h);
  ctx.lineTo(r,h);  ctx.quadraticCurveTo(0,h,0,h-r);
  ctx.lineTo(0,r);  ctx.quadraticCurveTo(0,0,r,0);
  ctx.closePath();
  ctx.fill();

  ctx.font = font;
  ctx.fillStyle = color;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, w / 2, h / 2);

  const texture  = new THREE.CanvasTexture(canvas);
  const material = new THREE.SpriteMaterial({ map: texture, depthWrite: false });
  const sprite   = new THREE.Sprite(material);

  // Height in scene units; width proportional to canvas aspect
  const baseH = 7 * textScale;
  sprite.scale.set(baseH * (w / h), baseH, 1);
  sprite.position.set(0, yOffset, 0);
  return sprite;
}

// ── Render ────────────────────────────────────────────────────────
const graph = ForceGraph3D()(document.getElementById('3d-graph'))
  .graphData(graphData)
  .backgroundColor('#000011')
  .showNavInfo(false)

  // Spheres
  .nodeColor(node => COLORS[node.group] || '#ffffff')
  .nodeRelSize(5)
  .nodeVal(node => node.val || 1)
  .nodeOpacity(0.92)

  // Labels: bigger for questions, y-offset clears the sphere
  .nodeThreeObject(node => {
    const isQ     = node.group === 'question';
    const scale   = isQ ? 1.5 : 1.05;
    // offset scales with sphere radius so label never overlaps the dot
    const radius  = 5 * Math.sqrt(node.val || 1);
    const yOffset = radius + 7;
    return makeLabel(node.label, COLORS[node.group], scale, yOffset);
  })
  .nodeThreeObjectExtend(true)   // keep sphere AND add label

  // Links
  .linkColor(link => {
    const sid = link.source?.id ?? link.source;
    const s   = graphData.nodes.find(n => n.id === sid);
    return (COLORS[s?.group] ?? '#8888cc') + 'bb';
  })
  .linkWidth(1.5)
  .linkOpacity(0.55)
  .linkDirectionalParticles(4)
  .linkDirectionalParticleWidth(1.1)
  .linkDirectionalParticleSpeed(0.006)
  .linkDirectionalParticleColor(link => {
    const tid = link.target?.id ?? link.target;
    const t   = graphData.nodes.find(n => n.id === tid);
    return COLORS[t?.group] ?? '#aaaaff';
  })

  .cameraPosition({ z: 540 });

function viewportSize() {
  const viewport = window.visualViewport;
  return {
    width: Math.round(viewport?.width || window.innerWidth),
    height: Math.round(viewport?.height || window.innerHeight)
  };
}

function resizeGraph() {
  const { width, height } = viewportSize();
  graph.width(width).height(height);
}

let resizeFrame = null;
function scheduleResize() {
  if (resizeFrame) return;
  resizeFrame = requestAnimationFrame(() => {
    resizeFrame = null;
    resizeGraph();
  });
}

resizeGraph();
window.addEventListener('resize', scheduleResize);
window.visualViewport?.addEventListener('resize', scheduleResize);

// ── Quick framing buttons for live presentation ───────────────────
function focusNode(id) {
  const node = graphData.nodes.find(n => n.id === id);
  if (!node) return;
  const distance = id === 'Michelle' ? 135 : 165;
  const distRatio = 1 + distance / Math.hypot(node.x || 1, node.y || 1, node.z || 1);
  graph.cameraPosition(
    { x: (node.x || 0) * distRatio, y: (node.y || 0) * distRatio, z: (node.z || 0) * distRatio },
    node,
    1400
  );
}
function resetCamera() {
  graph.cameraPosition({ x: 0, y: 0, z: 540 }, { x: 0, y: 0, z: 0 }, 1400);
}
